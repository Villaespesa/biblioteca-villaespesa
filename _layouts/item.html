---
# JS based item page for CB-GH
layout: default
custom-foot: js/item-js.html;js/modal-hash-js.html
gallery: true
---

<div class="container py-3">
    <!-- Migas de pan -->
    <ul class="breadcrumb h6">
        <li class="breadcrumb-item"><a class="text-dark" href="{{ '/' | relative_url }}">{{ site.title }}</a></li>
        <li class="breadcrumb-item"><a class="text-dark" href="{{ '/browse.html' | relative_url }}">Browse</a></li>
        <li id="bc-title" class="breadcrumb-item active text-dark" aria-current="page"></li>
    </ul>

    <!-- Spinner de carga -->
    <div id="loading" class="text-center">
        <div class="spinner-border text-secondary" role="status"><span class="visually-hidden">Loading...</span></div>
    </div>

    <!-- DISEÑO EN PARALELO -->
    <div class="row mt-4">

        <!-- COLUMNA IZQUIERDA: Portada -->
        <div class="col-12 col-md-4 mb-4">
            <div id="item-content"></div>
        </div>

       <!-- COLUMNA DERECHA: Título y Metadatos -->
        <div class="col-12 col-md-7 offset-md-1">
            
            <!-- El div del formato oculto para que el JS no se rompa -->
            <div id="item-format" class="d-none"></div>
            
            <h2 id="item-title" class="mb-4"></h2>
            
            <!-- EL VIGILANTE JAVASCRIPT: Oculta Latitud y Longitud en cuanto aparecen -->
            <script>
                // Creamos un observador que vigila cuando la página inyecta datos nuevos
                const observer = new MutationObserver(function(mutations) {
                    // Buscamos todas las etiquetas de la lista (ya sean <dt> o <th>)
                    const etiquetas = document.querySelectorAll('#item-metadata dt, #item-metadata th');
                    etiquetas.forEach(function(etiqueta) {
                        // Si el texto de la etiqueta contiene "Latitud" o "Longitud"
                        if (etiqueta.textContent.includes('Latitud') || etiqueta.textContent.includes('Longitud')) {
                            etiqueta.style.display = 'none'; // Oculta la palabra (Ej: "Latitud:")
                            if (etiqueta.nextElementSibling) {
                                etiqueta.nextElementSibling.style.display = 'none'; // Oculta el dato (Ej: "40.416")
                            }
                        }
                    });
                });
                
                // Le decimos al vigilante que empiece a mirar dentro del div de metadatos cuando la página cargue
                document.addEventListener("DOMContentLoaded", function() {
                    const cajaMetadatos = document.getElementById('item-metadata');
                    if(cajaMetadatos) {
                        observer.observe(cajaMetadatos, { childList: true, subtree: true });
                    }
                });
            </script>
            
            <!-- Aquí es donde la página inyectará la lista -->
            <div id="item-metadata"></div>
        </div>
        
    </div>

    <!-- SECCIÓN INFERIOR -->
    <div class="row mt-5">
        <div class="col-12">
            <hr>
            <h4 class="text-muted">Aquí irá el contenido futuro...</h4>
        </div>
    </div>

    <!-- BOTONES -->
    <div id="browse-buttons" class="text-center mt-5">
        <a class="btn btn-secondary" href="{{ '/browse.html' | relative_url }}">&laquo; Back to Collection Browse</a>
    </div>
    <div id="item-nav"></div>
 
</div>
