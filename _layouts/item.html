---
# JS based item page for CB-GH
layout: default
custom-foot: js/item-js.html;js/modal-hash-js.html
gallery: true
---

<div class="container py-3">
    <!-- Migas de pan (Navegación superior) -->
    <ul class="breadcrumb h6">
        <li class="breadcrumb-item"><a class="text-dark" href="{{ '/' | relative_url }}">{{ site.title }}</a></li>
        <li class="breadcrumb-item"><a class="text-dark" href="{{ '/browse.html' | relative_url }}">Browse</a></li>
        <li id="bc-title" class="breadcrumb-item active text-dark" aria-current="page"></li>
    </ul>

    <!-- Spinner de carga -->
    <div id="loading" class="text-center">
        <div class="spinner-border text-secondary" role="status"><span class="visually-hidden">Loading...</span></div>
    </div>

    <!-- AQUÍ EMPIEZA NUESTRO NUEVO DISEÑO EN PARALELO -->
    <div class="row mt-4">

        <!-- COLUMNA IZQUIERDA: Portada (Ocupa 5 de 12 espacios) -->
        <div class="col-12 col-md-5 mb-4">
            <!-- El JS inyectará la imagen aquí automáticamente -->
            <div id="item-content"></div>
        </div>

        <!-- COLUMNA DERECHA: Título y Metadatos (Ocupa 7 de 12 espacios) -->
        <div class="col-12 col-md-7">
            <!-- Hemos movido el título y el formato aquí adentro -->
            <div class="my-0 h5 text-muted small" id="item-format"></div>
            <h2 id="item-title" class="mb-4"></h2>
            
            <!-- El JS inyectará la lista de metadatos (descripción, fecha, etc) aquí -->
            <div id="item-metadata"></div>
        </div> 
        
    </div>

    <!-- ESPACIO INFERIOR: Para añadir otras cosas en el futuro -->
    <div class="row mt-5">
        <div class="col-12">
            <hr>
            <!-- Puedes borrar este texto cuando quieras, es para que veas dónde va -->
            <h4 class="text-muted">Aquí irá el contenido futuro...</h4>
        </div>
    </div>

    <!-- Botones de navegación inferiores -->
    <div id="browse-buttons" class="text-center mt-5">
        <a class="btn btn-secondary" href="{{ '/browse.html' | relative_url }}">&laquo; Back to Collection Browse</a>
    </div>
    <div id="item-nav"></div>
 
</div>
