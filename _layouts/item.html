---
# JS based item page for CB-GH
layout: default
custom-foot: js/item-js.html;js/modal-hash-js.html
gallery: true
---

<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap');

    /* 1. Migas de pan (Breadcrumbs) */
    .brutalist-breadcrumb {
        font-family: 'Inter', sans-serif;
        font-weight: 900;
        text-transform: uppercase;
        font-size: 0.8rem;
        letter-spacing: 0.5px;
        margin-bottom: 2rem;
    }
    .brutalist-breadcrumb .breadcrumb-item a {
        color: #555555 !important;
        text-decoration: none;
        border-bottom: 2px solid transparent;
        transition: all 0.2s ease;
    }
    .brutalist-breadcrumb .breadcrumb-item a:hover {
        color: #111111 !important;
        border-bottom: 2px solid #111111;
    }
    .brutalist-breadcrumb .breadcrumb-item.active {
        color: #111111 !important;
        font-family: 'Archivo Black', sans-serif;
    }

    /* 2. Título Principal del Libro */
    #item-title {
        font-family: 'Archivo Black', sans-serif;
        text-transform: uppercase;
        font-size: clamp(2rem, 3vw, 3rem);
        color: #111111;
        line-height: 1.1;
        border-bottom: 6px solid #111111;
        padding-bottom: 1rem;
        margin-bottom: 2.5rem;
        letter-spacing: -1px;
    }

    /* 3. Estilo para el contenedor de la portada (Columna izquierda) */
    #item-content {
        border: 4px solid #111111;
        padding: 0.75rem;
        background-color: #ffffff;
        box-shadow: 6px 6px 0px #111111;
        margin-bottom: 1.5rem;
    }
    /* El contenido interno (imágenes o visores) se adapta al borde */
    #item-content img, #item-content iframe {
        border: 2px solid #111111 !important;
        width: 100%;
    }

    /* ========================================== */
    /* 4. METADATOS: CUADRÍCULA SIN SALTO DE LÍNEA */
    /* ========================================== */
    #item-metadata dl {
        display: grid;
        /* La primera columna es para el título, la segunda para el valor */
        grid-template-columns: minmax(140px, auto) 1fr; 
        row-gap: 0;
        align-items: stretch;
        border-top: 3px solid #111111;
    }

    /* Etiquetas ("Autor:", "Fecha:", etc.) */
    #item-metadata dt {
        font-family: 'Archivo Black', sans-serif;
        font-size: 0.85rem;
        text-transform: uppercase;
        color: #111111;
        margin: 0;
        padding: 1rem 1rem 1rem 0;
        border-bottom: 1px solid #dddddd;
        border-right: 3px solid #111111; /* Línea divisoria vertical */
        display: flex;
        align-items: center;
    }

    /* Valores de los datos */
    #item-metadata dd {
        font-family: 'Inter', sans-serif;
        font-size: 1.05rem;
        color: #111111;
        margin: 0;
        padding: 1rem 0 1rem 1.5rem;
        border-bottom: 1px solid #dddddd;
        display: flex;
        align-items: center;
        flex-wrap: wrap; /* Permite que las etiquetas bajen si hay muchas */
        gap: 0.6rem; /* Separación entre las etiquetas */
    }

    /* ========================================== */
    /* 5. ETIQUETAS (Géneros, Subjects, Autores)  */
    /* ========================================== */
    /* Cualquier enlace dentro de los metadatos se convierte en etiqueta interactiva */
    #item-metadata dd a {
        display: inline-block;
        border: 2px solid #111111;
        background-color: #ffffff;
        color: #111111 !important;
        padding: 0.3rem 0.8rem;
        font-size: 0.8rem;
        font-family: 'Archivo Black', sans-serif;
        text-transform: uppercase;
        text-decoration: none;
        transition: all 0.2s ease;
        box-shadow: 2px 2px 0px #111111;
        white-space: nowrap;
    }
    
    #item-metadata dd a:hover {
        background-color: #111111;
        color: #ffffff !important;
        transform: translate(1px, 1px);
        box-shadow: 1px 1px 0px #111111;
    }

    /* 6. Botones inferiores Brutalistas */
    .brutalist-btn {
        display: inline-block;
        border: 3px solid #111111;
        background-color: #ffffff;
        color: #111111 !important;
        font-family: 'Archivo Black', sans-serif;
        font-size: 1rem;
        text-transform: uppercase;
        padding: 0.8rem 2rem;
        text-decoration: none !important;
        box-shadow: 4px 4px 0px #111111;
        transition: all 0.15s ease;
    }
    .brutalist-btn:hover {
        background-color: #111111;
        color: #ffffff !important;
        transform: translate(2px, 2px);
        box-shadow: 1px 1px 0px #111111;
    }
</style>

<div class="container py-3">
    
    <!-- Migas de pan brutalistas -->
    <ul class="breadcrumb brutalist-breadcrumb">
        <li class="breadcrumb-item"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></li>
        <li class="breadcrumb-item"><a href="{{ '/browse.html' | relative_url }}">Catálogo</a></li>
        <li id="bc-title" class="breadcrumb-item active" aria-current="page"></li>
    </ul>

    <!-- Spinner de carga -->
    <div id="loading" class="text-center my-5">
        <div class="spinner-border text-dark" style="border-width: 0.25em;" role="status">
            <span class="visually-hidden">Cargando...</span>
        </div>
    </div>

    <!-- DISEÑO EN PARALELO -->
    <div class="row mt-4">

        <!-- COLUMNA IZQUIERDA: Portada (Mantiene proporciones) -->
        <div class="col-12 col-md-4 mb-4">
            <div id="item-content"></div>
        </div>

        <!-- COLUMNA DERECHA: Título y Metadatos -->
        <div class="col-12 col-md-7 offset-md-1">
            
            <!-- El div del formato oculto para que el JS no se rompa -->
            <div id="item-format" class="d-none"></div>
            
            <h2 id="item-title"></h2>
            
            <!-- Aquí es donde la página inyectará la cuadrícula -->
            <div id="item-metadata"></div>

            <!-- SCRIPT LIMPIADOR INTANCTO -->
            <script>
                let limpiador = setInterval(function() {
                    let caja = document.getElementById('item-metadata');
                    
                    if (caja && caja.innerHTML.trim() !== '') {
                        let etiquetas = caja.querySelectorAll('dt, th');
                        
                        etiquetas.forEach(function(dt) {
                            let texto = dt.textContent || dt.innerText;
                            
                            if (texto.includes('Digitalización') || texto.includes('Latitud') || texto.includes('Longitud')) {
                                dt.style.display = 'none'; 
                                
                                if (dt.nextElementSibling) {
                                    dt.nextElementSibling.style.display = 'none'; 
                                }
                            }
                        });
                        
                        clearInterval(limpiador); 
                    }
                }, 100); 
                
                setTimeout(() => clearInterval(limpiador), 5000);
            </script>

        </div> 
        
    </div>

    <!-- SECCIÓN INFERIOR -->
    <div class="row mt-5">
        <div class="col-12 text-center">
            <hr style="border-top: 4px solid #111111; opacity: 1; margin-bottom: 3rem;">
        </div>
    </div>

    <!-- BOTONES -->
    <div id="browse-buttons" class="text-center mt-2 mb-5">
        <a class="brutalist-btn" href="{{ '/browse.html' | relative_url }}">&laquo; Volver al catálogo</a>
    </div>
    <div id="item-nav"></div>
 
</div>
