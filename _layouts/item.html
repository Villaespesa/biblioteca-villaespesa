---
# JS based item page for CB-GH
layout: default
custom-foot: js/item-js.html;js/modal-hash-js.html
gallery: true
---

<div class="container py-3">
    <!-- Migas de pan -->
    <ul class="breadcrumb h6">
        <li class="breadcrumb-item"><a class="text-dark" href="{{ '/' | relative_url }}">{{ site.title }}</a></li>
        <li class="breadcrumb-item"><a class="text-dark" href="{{ '/browse.html' | relative_url }}">Browse</a></li>
        <li id="bc-title" class="breadcrumb-item active text-dark" aria-current="page"></li>
    </ul>

    <!-- Spinner de carga -->
    <div id="loading" class="text-center">
        <div class="spinner-border text-secondary" role="status"><span class="visually-hidden">Loading...</span></div>
    </div>

    <!-- DISEÑO EN PARALELO -->
    <div class="row mt-4">

        <!-- COLUMNA IZQUIERDA: Portada -->
        <div class="col-12 col-md-4 mb-4">
            <div id="item-content"></div>
        </div>

       <!-- COLUMNA DERECHA: Título y Metadatos -->
        <div class="col-12 col-md-7 offset-md-1">
            
            <!-- El div del formato oculto para que el JS no se rompa -->
            <div id="item-format" class="d-none"></div>
            
            <h2 id="item-title" class="mb-4"></h2>
            
            <!-- EL VIGILANTE PERSISTENTE 2.0 (Oculta y Traduce) -->
            <script>
                let vigilante = setInterval(function() {
                    
                    // TAREA 1: Ocultar Latitud y Longitud
                    let caja = document.getElementById('item-metadata');
                    if (caja) {
                        let elementos = caja.querySelectorAll('dt, th, tr, p');
                        elementos.forEach(function(elemento) {
                            let texto = elemento.textContent || elemento.innerText;
                            if (texto.includes('Latitud') || texto.includes('Longitud')) {
                                elemento.style.display = 'none';
                                if (elemento.tagName === 'DT' && elemento.nextElementSibling) {
                                    elemento.nextElementSibling.style.display = 'none';
                                }
                            }
                        });
                    }

                    // TAREA 2: Traducir y modificar los botones
                    let botones = document.querySelectorAll('a.btn');
                    botones.forEach(function(btn) {
                        
                        // Si encuentra el botón del Mapa
                        if (btn.innerHTML.includes('View on Map')) {
                            btn.innerHTML = btn.innerHTML.replace('View on Map', 'Ver en el Mapa');
                        }
                        
                        // Si encuentra el botón de la Línea de Tiempo
                        if (btn.innerHTML.includes('View on Timeline')) {
                            btn.innerHTML = btn.innerHTML.replace('View on Timeline', 'Ver en la Línea de Tiempo');
                        }

                        // Si encuentra el botón de Descarga (suele poner 'Download' o 'Download JPG')
                        if (btn.innerHTML.includes('Download') || btn.innerHTML.includes('Descargar')) {
                            // Cambiamos el texto
                            btn.innerHTML = 'Ver Digitalización';
                            // Le quitamos la orden de "descargar un archivo" al navegador
                            btn.removeAttribute('download');
                            // Le ponemos un color diferente si quieres (ej. btn-primary para azul, o lo dejamos igual)
                            btn.className = btn.className.replace('btn-outline-primary', 'btn-primary');
                        }
                    });
                    
                }, 200); 
                
                // Apagamos el vigilante a los 10 segundos
                setTimeout(() => clearInterval(vigilante), 10000);
            </script>
            
            <!-- Aquí es donde la página inyectará la lista -->
            <div id="item-metadata"></div>
        </div>
        
    </div>

    <!-- SECCIÓN INFERIOR -->
    <div class="row mt-5">
        <div class="col-12">
            <hr>
            <h4 class="text-muted">Aquí irá el contenido futuro...</h4>
        </div>
    </div>

    <!-- BOTONES -->
    <div id="browse-buttons" class="text-center mt-5">
        <a class="btn btn-secondary" href="{{ '/browse.html' | relative_url }}">&laquo; Back to Collection Browse</a>
    </div>
    <div id="item-nav"></div>
 
</div>
