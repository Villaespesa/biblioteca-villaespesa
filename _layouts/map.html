---
# Default leaflet map page
layout: default
custom-foot: js/map-js.html
---

<style>
    @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

    /* 1. Títulos de la página */
    .map-page-title {
        font-family: 'Archivo Black', sans-serif;
        text-transform: uppercase;
        font-size: clamp(2rem, 5vw, 3.5rem);
        color: #111111;
        margin-top: 3rem;
        margin-bottom: 0.5rem;
        letter-spacing: -1px;
    }
    
    .map-page-desc {
        font-family: 'Inter', sans-serif;
        font-size: 1.1rem;
        color: #555555;
        margin-bottom: 2rem;
    }

    /* 2. El Contenedor del Mapa */
    #map {
        width: 100%;
        height: 75vh;
        min-height: 500px;
        background-color: #ffffff; /* Fondo blanco puro antes de cargar */
        border: 4px solid #111111;
        box-shadow: 8px 8px 0px #111111;
        margin-bottom: 5rem;
        z-index: 1; 
    }

    /* 3. ALTO CONTRASTE EXTREMO: Blanco puro y Negro profundo */
    .leaflet-tile-pane {
        /* Al forzar el contraste al 350% y subir el brillo, 
           los grises medios se queman (blanco) y las líneas se oscurecen (negro) */
        filter: grayscale(100%) contrast(350%) brightness(1.3);
    }

    /* 4. Pines (Marcadores) como Siluetas Negras */
    .leaflet-marker-icon {
        /* Destruye el color azul y lo convierte en negro sólido */
        filter: grayscale(100%) brightness(0) contrast(100) !important;
    }
    .leaflet-marker-shadow {
        opacity: 0.8 !important; /* Sombra más pronunciada para compensar el blanco puro */
    }

    /* 5. Controles de Zoom en Negativo */
    .leaflet-bar {
        box-shadow: 4px 4px 0px rgba(0,0,0,1) !important;
        border: none !important;
        border-radius: 0 !important;
    }
    .leaflet-bar a {
        background-color: #111111 !important;
        color: #ffffff !important;
        border: 2px solid #ffffff !important; 
        border-radius: 0 !important;
        font-family: 'Archivo Black', sans-serif !important;
        font-size: 1.2rem !important;
        line-height: 1.5 !important;
        transition: all 0.2s ease !important;
    }
    .leaflet-bar a:first-child {
        border-bottom: none !important;
    }
    .leaflet-bar a:hover {
        background-color: #ffffff !important;
        color: #111111 !important;
        border-color: #111111 !important;
    }

    /* 6. Pop-ups en Negativo (Elegancia Absoluta) */
    .leaflet-popup-content-wrapper {
        background-color: #111111 !important;
        color: #ffffff !important;
        border: 4px solid #111111 !important;
        border-radius: 0 !important;
        box-shadow: 8px 8px 0px rgba(0,0,0,0.1) !important;
        padding: 0 !important;
    }
    
    /* El triángulo inferior del bocadillo */
    .leaflet-popup-tip {
        background-color: #111111 !important;
        border: none !important;
        box-shadow: none !important;
        width: 16px !important;
        height: 16px !important;
        margin: -8px auto 0 !important;
    }
    
    /* Contenido interno del bocadillo */
    .leaflet-popup-content {
        font-family: 'Inter', sans-serif !important;
        margin: 1.5rem !important;
        line-height: 1.4 !important;
    }
    
    /* Títulos y enlaces dentro del Pop-up */
    .leaflet-popup-content h4 {
        font-family: 'Archivo Black', sans-serif !important;
        text-transform: uppercase !important;
        font-size: 1.1rem !important;
        color: #ffffff !important;
        border-bottom: 2px solid #ffffff !important;
        padding-bottom: 0.5rem !important;
        margin-bottom: 1rem !important;
    }
    .leaflet-popup-content a {
        color: #ffffff !important;
        font-weight: 900 !important;
        text-decoration: none !important;
        border-bottom: 2px solid #ffffff !important;
        transition: all 0.2s ease !important;
    }
    .leaflet-popup-content a:hover {
        color: #111111 !important;
        background-color: #ffffff !important;
    }
    .leaflet-popup-content img {
        border: 2px solid #ffffff !important;
        margin-bottom: 1rem !important;
        width: 100% !important;
        filter: grayscale(100%);
        transition: filter 0.3s ease !important;
    }
    .leaflet-popup-content img:hover {
        filter: grayscale(0%);
    }

    /* Botón de cerrar del Pop-up (La 'X') */
    .leaflet-popup-close-button {
        color: #ffffff !important;
        font-size: 1.5rem !important;
        font-weight: 900 !important;
        padding: 4px 8px !important;
        transition: all 0.2s ease !important;
    }
    .leaflet-popup-close-button:hover {
        color: #111111 !important;
        background-color: #ffffff !important;
    }
</style>

<div class="container-fluid" style="padding: 0 5%;">
    
    <h1 class="map-page-title">Mapa de la Colección</h1>
    <p class="map-page-desc">Explora la ubicación geográfica de los objetos de nuestro archivo.</p>
    
    <div id="map"></div>
    
</div>
