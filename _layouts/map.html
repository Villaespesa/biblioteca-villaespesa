---
# Default leaflet map page
layout: default
custom-foot: js/map-js.html
---

<style>
    @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

    /* 1. Títulos de la página */
    .map-page-title {
        font-family: 'Archivo Black', sans-serif;
        text-transform: uppercase;
        font-size: clamp(2rem, 5vw, 3.5rem);
        color: #111111;
        margin-top: 3rem;
        margin-bottom: 0.5rem;
        letter-spacing: -1px;
    }
    
    .map-page-desc {
        font-family: 'Inter', sans-serif;
        font-size: 1.1rem;
        color: #555555;
        margin-bottom: 2rem;
    }

    /* 2. El Contenedor del Mapa */
    #map {
        width: 100%;
        height: 75vh;
        min-height: 500px;
        background-color: #ffffff;
        border: 4px solid #111111;
        box-shadow: 8px 8px 0px #111111;
        margin-bottom: 5rem;
        z-index: 1; 
    }

    /* 3. Pines Individuales Negros */
    img.leaflet-marker-icon {
        filter: grayscale(100%) brightness(0) drop-shadow(2px 2px 0px rgba(0,0,0,0.3)) !important;
    }

    /* 4. Clústeres (Grupos de pines con número) */
    .marker-cluster {
        background-color: transparent !important;
    }
    .marker-cluster div {
        background-color: #111111 !important; 
        color: #ffffff !important; 
        font-family: 'Archivo Black', sans-serif !important;
        border: 3px solid #ffffff !important; 
        box-shadow: 3px 3px 0px rgba(0,0,0,0.4) !important;
        border-radius: 50% !important;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .marker-cluster span {
        font-family: 'Archivo Black', sans-serif !important;
    }

    /* 5. Controles de Zoom */
    .leaflet-bar {
        box-shadow: 4px 4px 0px rgba(0,0,0,1) !important;
        border: none !important;
        border-radius: 0 !important;
    }
    .leaflet-bar a {
        background-color: #111111 !important;
        color: #ffffff !important;
        border: 2px solid #ffffff !important; 
        border-radius: 0 !important;
        font-family: 'Archivo Black', sans-serif !important;
        font-size: 1.2rem !important;
        line-height: 1.5 !important;
        transition: all 0.2s ease !important;
    }
    .leaflet-bar a:first-child {
        border-bottom: none !important;
    }
    .leaflet-bar a:hover {
        background-color: #ffffff !important;
        color: #111111 !important;
        border-color: #111111 !important;
    }

    /* 6. POP-UPS (Fichas minimalistas y elegantes) */
    .leaflet-popup-content-wrapper {
        background-color: #ffffff !important; 
        color: #111111 !important; 
        border: 3px solid #111111 !important; 
        border-radius: 0 !important; 
        box-shadow: 6px 6px 0px #111111 !important;
        padding: 0 !important;
    }
    
    .leaflet-popup-tip {
        background-color: #111111 !important;
        border: none !important;
        box-shadow: none !important;
        width: 14px !important;
        height: 14px !important;
        margin: -7px auto 0 !important;
    }
    
    .leaflet-popup-content {
        font-family: 'Inter', sans-serif !important;
        margin: 1.2rem !important;
        line-height: 1.4 !important;
    }
    
    .leaflet-popup-content h4 {
        font-family: 'Archivo Black', sans-serif !important;
        text-transform: uppercase !important;
        font-size: 1rem !important;
        color: #111111 !important;
        border-bottom: 2px solid #111111 !important;
        padding-bottom: 0.5rem !important;
        margin-bottom: 1rem !important;
    }

    .leaflet-popup-content img {
        width: 100% !important;
        height: auto !important; 
        max-height: 200px !important; 
        object-fit: contain !important; 
        background-color: #f9f9f9 !important; 
        padding: 0.5rem !important;
        border: 1px solid #eeeeee !important;
        margin-bottom: 1rem !important;
    }

    .leaflet-popup-content p {
        margin-bottom: 1rem !important;
    }

    .leaflet-popup-content .btn {
        display: block !important;
        background-color: #111111 !important;
        color: #ffffff !important;
        font-family: 'Archivo Black', sans-serif !important;
        text-transform: uppercase !important;
        text-align: center !important;
        border: 2px solid #111111 !important;
        border-radius: 0 !important;
        padding: 0.5rem 1rem !important;
        text-decoration: none !important;
        transition: all 0.2s ease !important;
    }
    .leaflet-popup-content .btn:hover {
        background-color: #ffffff !important;
        color: #111111 !important;
    }

    .leaflet-popup-close-button {
        color: #111111 !important;
        font-size: 1.5rem !important;
        font-weight: 900 !important;
        padding: 4px 8px !important;
        transition: all 0.2s ease !important;
    }
    .leaflet-popup-close-button:hover {
        color: #ffffff !important;
        background-color: #111111 !important;
    }
</style>

<!-- ESTRUCTURA DE LA PÁGINA -->
<div class="container-fluid" style="padding: 0 5%;">
    <h1 class="map-page-title">Mapa de la Colección</h1>
    <p class="map-page-desc">Explora la ubicación geográfica de los objetos de nuestro archivo.</p>
    
    <div id="map"></div>
</div>

<!-- SCRIPT MÁGICO PARA TRADUCIR Y CENTRAR LA FICHA -->
<script>
    window.addEventListener('load', function() {
        // Damos un pequeño respiro para asegurar que el mapa original ha cargado
        setTimeout(function() {
            if (typeof map !== 'undefined') {
                
                // Cada vez que se abre una chincheta...
                map.on('popupopen', function(e) {
                    var popupNode = e.popup._contentNode;
                    if (!popupNode) return;

                    // 1. TRADUCCIÓN: Buscamos el botón y lo cambiamos al español
                    var btn = popupNode.querySelector('a.btn');
                    if (btn && btn.innerHTML.includes('View Item')) {
                        btn.innerHTML = 'Ver libro';
                    }

                    // 2. CENTRADO PERFECTO: Esperamos a que la foto cargue
                    var img = popupNode.querySelector('img');
                    if (img) {
                        img.onload = function() {
                            e.popup.update(); // Recalcula el tamaño ahora que la foto está
                            
                            // Movemos el mapa hacia arriba para acomodar la ficha
                            var px = map.project(e.popup._latlng);
                            px.y -= e.popup._container.clientHeight / 2 - 20; 
                            map.panTo(map.unproject(px), {animate: true});
                        };
                    } else {
                        // Si por algún casual no hay foto, centramos directamente
                        var px = map.project(e.popup._latlng);
                        px.y -= e.popup._container.clientHeight / 2 - 20; 
                        map.panTo(map.unproject(px), {animate: true});
                    }
                });
            }
        }, 800); 
    });
</script>
