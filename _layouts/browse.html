---
# collection "Browse" page
layout: page
custom-foot: js/browse-js.html
---

<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap');

    /* 1. Título de la página reducido */
    .browse-header {
        font-family: 'Archivo Black', sans-serif;
        text-transform: uppercase;
        font-size: clamp(2rem, 4vw, 3rem); /* Escala menor */
        border-bottom: 6px solid #111111;
        padding-bottom: 0.5rem;
        letter-spacing: -1px;
        margin-bottom: 2rem;
        color: #111111;
    }

    /* 2. Buscador y botones Brutalistas (Escala reducida) */
    #filterTextBox {
        border: 3px solid #111111;
        border-radius: 0;
        font-family: 'Inter', sans-serif;
        font-weight: 700;
        font-size: 1rem; /* Letra más pequeña */
        padding: 0.5rem 1rem;
        box-shadow: 3px 3px 0px #111111;
    }
    #filterTextBox:focus {
        box-shadow: 5px 5px 0px #111111;
        outline: none;
    }
    
    #filterButton, .filter, #browseSortButton {
        border: 3px solid #111111;
        border-radius: 0;
        font-family: 'Archivo Black', sans-serif;
        font-size: 0.9rem;
        text-transform: uppercase;
        background-color: #111111;
        color: #ffffff;
        box-shadow: 3px 3px 0px #111111;
        transition: all 0.1s ease;
    }
    
    #filterButton:hover, .filter:hover, #browseSortButton:hover {
        transform: translate(2px, 2px);
        box-shadow: 1px 1px 0px #111111;
        background-color: #ffffff;
        color: #111111;
    }

    /* 3. FORZAR CUADRÍCULA DE 6 COLUMNAS (La Magia CSS) */
    #browseItems {
        display: grid !important;
        grid-template-columns: repeat(2, 1fr); /* Móviles: 2 columnas */
        gap: 1.5rem; /* Espacio entre libros */
    }
    @media (min-width: 768px) {
        #browseItems {
            grid-template-columns: repeat(4, 1fr); /* Tablets: 4 columnas */
        }
    }
    @media (min-width: 1200px) {
        #browseItems {
            grid-template-columns: repeat(6, 1fr); /* Escritorio: 6 columnas */
        }
    }

    /* Anulamos las columnas automáticas de Bootstrap que intenta meter CollectionBuilder */
    #browseItems > div {
        width: 100% !important;
        max-width: 100% !important;
        flex: none !important;
        padding: 0 !important;
        margin: 0 !important;
    }

    /* 4. Estilo de las tarjetas (Más compactas) */
    #browseItems .card {
        border: 2px solid #111111 !important;
        border-radius: 0 !important;
        background-color: #ffffff !important;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        height: 100%;
    }
    #browseItems .card:hover {
        transform: translate(-3px, -3px);
        box-shadow: 5px 5px 0px #111111;
    }
    
    #browseItems .card-img-top {
        border-bottom: 2px solid #111111;
        border-radius: 0 !important;
        aspect-ratio: 2/3;
        object-fit: cover;
    }

    #browseItems .card-body {
        padding: 0.75rem !important; /* Relleno mínimo para ganar espacio */
        display: flex;
        flex-direction: column;
    }
    
    #browseItems .card-title {
        font-family: 'Inter', sans-serif;
        font-weight: 900;
        font-size: 0.85rem !important; /* Títulos pequeños pero legibles */
        line-height: 1.2;
        text-transform: uppercase;
        color: #111111;
        margin-bottom: 0.25rem !important;
    }
    
    #browseItems .card-text {
        font-family: 'Inter', sans-serif;
        font-size: 0.75rem !important; /* Letra de datos pequeña */
        color: #555555;
        margin-bottom: 0 !important;
    }

    /* 5. ELIMINAR ETIQUETAS: Ocultamos botones y líneas innecesarias */
    #browseItems .card-body a.btn, 
    #browseItems .card-body a.btn-sm,
    #browseItems .card-body .text-muted,
    #browseItems .card-body hr {
        display: none !important;
    }
</style>

<div class="container-fluid my-4" style="padding: 0 3%;">

    <div class="row">
        <div class="col-12">
            <h1 class="browse-header">Catálogo General</h1>
            {{ content }}
        </div>
    </div>

    <!-- Buscador compacto (eliminada clase input-group-lg) -->
    <div class="row mb-4 justify-content-center">
        <div class="col-md-9 text-center mb-3">
            <form role="search" id="browseFilter" onsubmit="submitFilter(); return false;">
                <div class="input-group">
                    <input type="text" class="form-control" id="filterTextBox" placeholder="Buscar obras..." aria-label="Search"> 
                    <button class="btn" type="submit" title="Filter items" id="filterButton">Buscar</button>
                    <button class="btn filter" onclick="resetFilter(); return false;" data-filter="">Reset</button>
                </div>
            </form>
            <div class="h5 mt-3" id="numberOf" style="font-family: 'Archivo Black', sans-serif; text-transform: uppercase;"></div>
        </div>
        
        <div class="col-md-3 mb-3">
            <div class="dropdown h-100">
                <button class="btn w-100 h-100 dropdown-toggle d-flex align-items-center justify-content-center" type="button" id="browseSortButton" data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                    Ordenar: <span id="sortFilter" class="ms-2">Aleatorio</span>
                </button>
                <div class="dropdown-menu browse-sort-menu w-100" aria-labelledby="browseSortButton" style="border: 3px solid #111111; border-radius: 0; box-shadow: 3px 3px 0px #111111;">
                    <button class="dropdown-item browse-sort-item active" data-filter="random" style="font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.9rem;">Aleatorio</button>
                    <button class="dropdown-item browse-sort-item" data-filter="title" style="font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.9rem;">Título</button>
                    {% assign sort_options = site.data.config-browse | where_exp: 'i','i.sort_name != nil' %}
                    {% for o in sort_options %}
                    <button class="dropdown-item browse-sort-item" data-filter="{{ o.field | escape }}" style="font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.9rem;">{{ o.sort_name }}</button>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>

    <!-- Indicador de carga minimizado -->
    <div id="loadingIcon" class="text-center my-4">
        <div class="spinner-border text-dark" style="width: 2rem; height: 2rem; border-width: 0.2em;" role="status">
            <span class="visually-hidden">Cargando...</span>
        </div>
    </div>

    <!-- EL JS RELLENA ESTE ESPACIO, PERO EL CSS GRID MANDA -->
    <div id="browseItems"></div>

</div>
