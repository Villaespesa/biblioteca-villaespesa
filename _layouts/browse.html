---
# collection "Browse" page
layout: page
custom-foot: js/browse-js.html
---

<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap');

    /* 1. Título de la página */
    .browse-header {
        font-family: 'Archivo Black', sans-serif;
        text-transform: uppercase;
        font-size: clamp(2.5rem, 5vw, 4.5rem);
        border-bottom: 8px solid #111111;
        padding-bottom: 0.5rem;
        letter-spacing: -2px;
        margin-bottom: 3rem;
        color: #111111;
    }

    /* 2. Buscador y botones Brutalistas */
    #filterTextBox {
        border: 4px solid #111111;
        border-radius: 0;
        font-family: 'Inter', sans-serif;
        font-weight: 700;
        font-size: 1.2rem;
        box-shadow: 4px 4px 0px #111111;
    }
    #filterTextBox:focus {
        box-shadow: 6px 6px 0px #111111;
        outline: none;
    }
    
    #filterButton, .filter, #browseSortButton {
        border: 4px solid #111111;
        border-radius: 0;
        font-family: 'Archivo Black', sans-serif;
        text-transform: uppercase;
        background-color: #111111;
        color: #ffffff;
        box-shadow: 4px 4px 0px #111111;
        transition: all 0.1s ease;
    }
    
    #filterButton:hover, .filter:hover, #browseSortButton:hover {
        transform: translate(2px, 2px);
        box-shadow: 2px 2px 0px #111111;
        background-color: #ffffff;
        color: #111111;
    }

    /* 3. Secuestro del diseño de las tarjetas (Inyectado por JS) */
    #browseItems .card {
        border: 3px solid #111111 !important;
        border-radius: 0 !important;
        background-color: #ffffff !important;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        height: 100%;
    }
    #browseItems .card:hover {
        transform: translate(-4px, -4px);
        box-shadow: 8px 8px 0px #111111;
    }
    
    /* Proporción de portada de libro para la imagen */
    #browseItems .card-img-top {
        border-bottom: 3px solid #111111;
        border-radius: 0 !important;
        aspect-ratio: 2/3;
        object-fit: cover;
    }

    /* Textos de la tarjeta (Títulos, autor, etc.) */
    #browseItems .card-body {
        padding: 1rem !important;
        display: flex;
        flex-direction: column;
    }
    #browseItems .card-title {
        font-family: 'Inter', sans-serif;
        font-weight: 900;
        font-size: 1.1rem;
        line-height: 1.2;
        text-transform: uppercase;
        color: #111111;
        margin-bottom: 0.5rem;
    }
    #browseItems .card-text {
        font-family: 'Inter', sans-serif;
        font-size: 0.85rem;
        color: #555555;
    }
</style>

<div class="container-fluid my-5" style="padding: 0 5%;">

    <div class="row">
        <div class="col-12">
            <h1 class="browse-header">Catálogo General</h1>
            {{ content }}
        </div>
    </div>

    <!-- MANTENEMOS TUS IDs ORIGINALES INTACTOS -->
    <div class="row mb-5 justify-content-center">
        <div class="col-md-9 text-center mb-3">
            <form role="search" id="browseFilter" onsubmit="submitFilter(); return false;">
                <div class="input-group input-group-lg">
                    <input type="text" class="form-control" id="filterTextBox" placeholder="Buscar por título, autor, año..." aria-label="Search"> 
                    <button class="btn" type="submit" title="Filter items" id="filterButton">Buscar</button>
                    <button class="btn filter" onclick="resetFilter(); return false;" data-filter="">Reset</button>
                </div>
            </form>
            <div class="h3 mt-3" id="numberOf" style="font-family: 'Archivo Black', sans-serif; text-transform: uppercase;"></div>
        </div>
        
        <div class="col-md-3 mb-3">
            <div class="dropdown h-100">
                <!-- Botón de Ordenar Brutalista -->
                <button class="btn w-100 h-100 dropdown-toggle d-flex align-items-center justify-content-center" type="button" id="browseSortButton" data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                    Ordenar: <span id="sortFilter" class="ms-2">Aleatorio</span>
                </button>
                <!-- Menú desplegable -->
                <div class="dropdown-menu browse-sort-menu w-100" aria-labelledby="browseSortButton" style="border: 4px solid #111111; border-radius: 0; box-shadow: 4px 4px 0px #111111;">
                    <button class="dropdown-item browse-sort-item active" data-filter="random" style="font-family: 'Inter', sans-serif; font-weight: 700;">Aleatorio</button>
                    <button class="dropdown-item browse-sort-item" data-filter="title" style="font-family: 'Inter', sans-serif; font-weight: 700;">Título</button>
                    {% assign sort_options = site.data.config-browse | where_exp: 'i','i.sort_name != nil' %}
                    {% for o in sort_options %}
                    <button class="dropdown-item browse-sort-item" data-filter="{{ o.field | escape }}" style="font-family: 'Inter', sans-serif; font-weight: 700;">{{ o.sort_name }}</button>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>

    <!-- ICONO DE CARGA BRUTALISTA -->
    <div id="loadingIcon" class="text-center my-5">
        <div class="spinner-border text-dark" style="width: 3rem; height: 3rem; border-width: 0.3em;" role="status">
            <span class="visually-hidden">Cargando...</span>
        </div>
    </div>

    <!-- AQUÍ EL JAVASCRIPT INYECTARÁ LAS TARJETAS (Y EL CSS LAS ATRAPARÁ) -->
    <div class="row g-4" id="browseItems"></div>

</div>
